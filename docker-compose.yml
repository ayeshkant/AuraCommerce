version: '3.8'
services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
     - ACCEPT_EULA=Y
     - SA_PASSWORD=YourStrong@Password123
  identity-api:
    build:
      context: ./AuraCommerce.IdentityApi
      dockerfile: Dockerfile
    ports:
      - "7001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=AuraCommerce_IdentityDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True
    depends_on:
      - sql-server
  catalog-api:
    build:
      context: ./AuraCommerce.CatalogApi
      dockerfile: Dockerfile
    ports:
      - "7002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=AuraCommerce_CatalogDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    depends_on:
      - sql-server